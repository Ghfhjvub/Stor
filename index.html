<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>حسون استور | HASSON Store</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    

    <style>

        :root {

            --primary-color: #ff4757;

            --bg-color: #f8f9fa;

            --text-color: #2f3542;

            --card-bg: #ffffff;

            --header-bg: #ffffff;

            --border-color: #e4e7ed;

            --shadow: 0 4px 15px rgba(0,0,0,0.05);

            --font-modifier: 100%;

        }
        [data-theme="dark"] {

            --bg-color: #111215;

            --text-color: #f1f2f6;

            --card-bg: #1e2024;

            --header-bg: #1e2024;

            --border-color: #2f3542;

            --shadow: 0 4px 15px rgba(0,0,0,0.3);

        }
        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            font-family: 'Cairo', sans-serif;

            transition: background 0.3s, color 0.3s;

        }
        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            font-size: var(--font-modifier);

            overflow-x: hidden;

        }
        /* Header */

        header {

            position: fixed;

            top: 0;

            width: 100%;

            background: var(--header-bg);

            box-shadow: var(--shadow);

            z-index: 1000;

            padding: 15px 5%;

            display: flex;

            justify-content: space-between;

            align-items: center;

        }
        .logo {

            font-size: 1.3rem;

            font-weight: 900;

            display: flex;

            align-items: center;

            gap: 8px;

            color: var(--primary-color);

        }
        .nav-actions {

            display: flex;

            align-items: center;

            gap: 20px;

        }
        .icon-btn {

            background: none;

            border: none;

            color: var(--text-color);

            font-size: 1.3rem;

            cursor: pointer;

            position: relative;

        }
        .cart-count {

            position: absolute;

            top: -8px;

            right: -8px;

            background: var(--primary-color);

            color: white;

            font-size: 0.7rem;

            padding: 2px 6px;

            border-radius: 50%;

            font-weight: bold;

        }
        /* Sidebar Menu */

        .sidebar {

            position: fixed;

            top: 0;

            right: -300px;

            width: 300px;

            height: 100%;

            background: var(--card-bg);

            box-shadow: var(--shadow);

            z-index: 1001;

            padding: 30px 20px;

            transition: 0.4s ease;

        }
        html[dir="ltr"] .sidebar {

            right: auto;

            left: -300px;

        }
        .sidebar.active {

            right: 0;

        }
        html[dir="ltr"] .sidebar.active {

            left: 0;

        }
        .sidebar-close {

            display: flex;

            justify-content: flex-end;

            margin-bottom: 30px;

        }
        .menu-item {

            margin-bottom: 25px;

        }
        .menu-item label {

            display: block;

            margin-bottom: 10px;

            font-weight: 600;

        }
        .menu-btn {

            width: 100%;

            padding: 12px;

            background: var(--bg-color);

            border: 1px solid var(--border-color);

            color: var(--text-color);

            border-radius: 8px;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 10px;

            font-weight: bold;

        }
        .font-slider {

            width: 100%;

            accent-color: var(--primary-color);

        }
        /* Main Content - Space below fixed header */

        .main-container {

            padding: 160px 3% 25px 3%;

        }
        .section-title {

            text-align: center;

            margin-bottom: 25px;

            font-size: 1.6rem;

            font-weight: 700;

        }
        .products-grid {

            display: grid;

            grid-template-columns: repeat(2, 1fr); /* منتجين في الصف */

            gap: 15px;

        }
        .product-card {

            background: var(--card-bg);

            border-radius: 12px;

            overflow: hidden;

            box-shadow: var(--shadow);

            border: 1px solid var(--border-color);

            display: flex;

            flex-direction: column;

            justify-content: space-between;

            position: relative;

        }
        .product-img {

            width: 100%;

            height: 150px;

            object-fit: cover;

        }
        .product-info {

            padding: 12px;

            text-align: center;

        }
        .product-title {

            font-size: 0.95rem;

            margin-bottom: 8px;

            font-weight: 700;

            white-space: nowrap;

            overflow: hidden;

            text-overflow: ellipsis;

        }
        .product-price {

            color: var(--primary-color);

            font-weight: bold;

            font-size: 0.95rem;

            margin-bottom: 10px;

        }
        .add-to-cart {

            width: 100%;

            padding: 8px;

            background: var(--primary-color);

            color: white;

            border: none;

            border-radius: 6px;

            cursor: pointer;

            font-size: 0.85rem;

            font-weight: bold;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 6px;

        }
        /* Games Section (6 small images) */

        .games-section {

            margin-top: 50px;

            padding: 20px 0;

            border-top: 1px dashed var(--border-color);

        }
        .games-grid {

            display: grid;

            grid-template-columns: repeat(3, 1fr); /* 3 صور في الصف على الجوال */

            gap: 10px;

        }
        @media (min-width: 768px) {

            .games-grid {

                grid-template-columns: repeat(6, 1fr); /* 6 صور في الصف على الشاشات الكبيرة */

            }

        }
        .game-img {

            width: 100%;

            height: 100px;

            object-fit: cover;

            border-radius: 8px;

            box-shadow: var(--shadow);

            border: 1px solid var(--border-color);

        }
        /* Modals & Forms */

        .modal {

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0,0,0,0.5);

            display: none;

            justify-content: center;

            align-items: center;

            z-index: 2000;

        }
        .modal.active { display: flex; }
        .modal-content {

            background: var(--card-bg);

            padding: 25px;

            border-radius: 15px;

            width: 90%;

            max-width: 450px;

            box-shadow: var(--shadow);

        }
        .modal-header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

        }
        .cart-items-list {

            max-height: 150px;

            overflow-y: auto;

            margin-bottom: 15px;

        }
        .cart-item {

            display: flex;

            justify-content: space-between;

            padding: 8px 0;

            border-bottom: 1px solid var(--border-color);

            font-size: 0.9rem;

        }
        .form-group {

            margin-bottom: 12px;

        }
        .form-group label {

            display: block;

            margin-bottom: 5px;

            font-weight: 600;

            font-size: 0.9rem;

        }
        .form-group input {

            width: 100%;

            padding: 10px;

            border: 1px solid var(--border-color);

            border-radius: 8px;

            background: var(--bg-color);

            color: var(--text-color);

            font-size: 0.9rem;

        }
        .checkout-btn {

            width: 100%;

            padding: 12px;

            background: #25d366;

            color: white;

            border: none;

            border-radius: 8px;

            font-weight: bold;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 10px;

            font-size: 1rem;

        }
        /* Floating WhatsApp Button */

        .whatsapp-float {

            position: fixed;

            bottom: 25px;

            left: 25px;

            background: #25d366;

            color: white;

            width: 55px;

            height: 55px;

            border-radius: 50%;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 1.8rem;

            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            z-index: 999;

            text-decoration: none;

        }
        html[dir="ltr"] .whatsapp-float {

            left: auto;

            right: 25px;

        }
        /* Footer */

        footer {

            background: var(--header-bg);

            border-top: 1px solid var(--border-color);

            padding: 30px 5%;

            text-align: center;

            margin-top: 40px;

        }
        .footer-socials {

            display: flex;

            justify-content: center;

            gap: 20px;

            margin-bottom: 15px;

        }
        .social-icon {

            font-size: 1.6rem;

            color: var(--text-color);

            transition: 0.3s;

        }
        .social-icon:hover {

            color: var(--primary-color);

        }

        /* الإضافات الجديدة المستحدثة للتصميم */
        
        /* شريط النص المتحرك المستمر */
        .marquee-container {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 8px 0;
            z-index: 999;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: var(--shadow);
            font-weight: bold;
            font-size: 0.95rem;
        }
        .marquee-content {
            display: inline-block;
            animation: marqueeEffect 15s linear infinite;
        }
        @keyframes marqueeEffect {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .marquee-item {
            margin: 0 30px;
            display: inline-block;
            letter-spacing: 2px;
        }

        /* شريط الإعلانات المتحرك المتغير */
        .ads-slider-container {
            width: 100%;
            height: 160px;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }
        .ads-slider {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.6s ease-in-out;
        }
        .ad-slide {
            min-width: 100%;
            height: 100%;
        }
        .ad-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* قسم العروض اليومية المؤقتة */
        .daily-offer-section {
            background: var(--card-bg);
            border: 2px dashed var(--primary-color);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 35px;
            box-shadow: var(--shadow);
            display: none;
        }
        .offer-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .offer-badge-title {
            background: var(--primary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .countdown-timer {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1rem;
            direction: ltr;
            background: var(--bg-color);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .offer-card-layout {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .offer-image-box {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
        }
        .offer-details-box {
            flex: 1;
        }
        .old-price-strike {
            text-decoration: line-through;
            color: #888;
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .badge-discount {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #25d366;
            color: white;
            padding: 3px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 5px;
            z-index: 5;
        }

    </style>
</head>

    <script>

        // رقم الواتساب الخاص بك لاستقبال الطلبات (قم بتغييره هنا)

        const WHATSAPP_NUMBER = "249118944652"; 
        // بيانات المنتجات الـ 10 

        const productsData = [

            { id: 1, nameAr: "PS4 Controller", nameEn: "Product 1", price: 50.000, img: "12.jpeg" },

            { id: 2, nameAr: "PS5 Controller", nameEn: "Product 2", price: 250.000, img: "13.jpeg" },

            { id: 3, nameAr: "Headset", nameEn: "Product 3", price: 200.000, img: "20.jpeg" },

            { id: 4, nameAr: "Mouse Pad", nameEn: "Product 4", price: 50.000, img: "24.jpg" },

            { id: 5, nameAr: "ps3", nameEn: "Product 5", price: 350.000, img: "23.jpg" },

            { id: 6, nameAr: "Mouse Attack Shark", nameEn: "Product 6", price: 175.000, img: "15.webp" },

            { id: 7, nameAr: "Keyboard", nameEn: "Product 7", price: 200.000, img: "21.jpg" },

            { id: 8, nameAr: "ps5 ", nameEn: "Product 8", price: 3500 , img: "5.webp" },

            { id: 9, nameAr: "ps4", nameEn: "Product 9", price: 800.000, img: "4.jpeg" },

            { id: 10, nameAr: "Car steering wheel", nameEn: "Product 10", price: 1500, img: "14.jpg" }

        ];
        let cart = [];

        let currentLang = 'ar';
        function renderProducts() {

            const grid = document.getElementById('productsGrid');

            grid.innerHTML = '';

            productsData.forEach(p => {

                const name = currentLang === 'ar' ? p.nameAr : p.nameEn;

                const btnText = currentLang === 'ar' ? 'إضافة' : 'Add';

                const currency = currentLang === 'ar' ? 'الف سوداني' : 'sudan';

                

                grid.innerHTML += `

                    <div class="product-card">

                        <img src="${p.img}" class="product-img" alt="${name}">

                        <div class="product-info">

                            <div class="product-title">${name}</div>

                            <div class="product-price">${p.price} ${currency}</div>

                            <button class="add-to-cart" onclick="addToCart(${p.id})">

                                <i class="fa-solid fa-cart-plus"></i> ${btnText}

                            </button>

                        </div>

                    </div>

                `;

            });

        }
        function toggleSidebar() {

            document.getElementById('sidebar').classList.toggle('active');

        }
        function toggleTheme() {

            const body = document.body;

            const isDark = body.getAttribute('data-theme') === 'dark';

            body.setAttribute('data-theme', isDark ? 'light' : 'dark');

            const themeIcon = document.querySelector('.menu-item i.fa-moon, .menu-item i.fa-sun');

            if(themeIcon) {

                themeIcon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';

            }

        }
        function changeFontSize(val) {

            document.documentElement.style.setProperty('--font-modifier', val + '%');

        }
        function toggleLanguage() {

            currentLang = currentLang === 'ar' ? 'en' : 'ar';

            const html = document.documentElement;

            

            if (currentLang === 'en') {

                html.setAttribute('dir', 'ltr');

                html.setAttribute('lang', 'en');

                document.getElementById('langBtnText').innerText = 'العربية';

            } else {

                html.setAttribute('dir', 'rtl');

                html.setAttribute('lang', 'ar');

                document.getElementById('langBtnText').innerText = 'English';

            }
            document.querySelectorAll('.lang-node').forEach(node => {

                node.innerText = node.getAttribute(`data-${currentLang}`);

            });
            renderProducts();
            
            // تحديث العروض التلقائية عند تغيير اللغة
            handleDailyOffers();

            updateCartUI();

        }
        function addToCart(id, customPrice = null) {

            const product = productsData.find(p => p.id === id);
            
            // في حال كان المنتج مضافاً من العروض وبسعر مخفض
            const finalPrice = customPrice !== null ? customPrice : product.price;

            // تم تمييز منتج العروض في السلة كي لا يختلط بالمنتج العادي بسعره الأصلي
            const cartItemId = customPrice !== null ? `offer-${id}` : id;
            const exist = cart.find(item => item.cartId === cartItemId);

            if(exist) {

                exist.qty++;

            } else {

                cart.push({...product, cartId: cartItemId, price: finalPrice, qty: 1});

            }

            updateCartUI();

        }
        function updateCartUI() {

            document.getElementById('cartCount').innerText = cart.reduce((acc, item) => acc + item.qty, 0);

            const list = document.getElementById('cartItemsList');

            list.innerHTML = '';

            let total = 0;
            cart.forEach(item => {

                const name = currentLang === 'ar' ? item.nameAr : item.nameEn;

                total += item.price * item.qty;

                list.innerHTML += `

                    <div class="cart-item">

                        <span>${name} (x${item.qty})</span>

                        <span>${item.price * item.qty}</span>

                    </div>

                `;

            });

            document.getElementById('cartTotal').innerText = total;

        }
        function toggleCartModal() {

            document.getElementById('cartModal').classList.toggle('active');

        }
        function sendOrder(e) {

            e.preventDefault();

            if(cart.length === 0) {

                alert(currentLang === 'ar' ? "السلة فارغة!" : "Cart is empty!");

                return;

            }
            const name = document.getElementById('custName').value;

            const phone = document.getElementById('custPhone').value;

            const address = document.getElementById('custAddress').value;

            

            let message = `*طلب جديد من موقع الصيني استور*\n\n`;

            message += `*الاسم:* ${name}\n`;

            message += `*رقم الهاتف:* ${phone}\n`;

            message += `*العنوان:* ${address}\n\n`;

            message += `*المنتجات:*\n`;

            

            cart.forEach(item => {

                const prodName = currentLang === 'ar' ? item.nameAr : item.nameEn;

                message += `- ${prodName} (العدد: ${item.qty}) - السعر: ${item.price * item.qty}\n`;

            });

            

            message += `\n*الإجمالي الكلي:* ${document.getElementById('cartTotal').innerText}`;

            

            const encodedMessage = encodeURIComponent(message);

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');

            

            cart = [];

            updateCartUI();

            toggleCartModal();

            document.getElementById('checkoutForm').reset();

        }

        // دالة تحريك السلايدر الإعلاني بشكل تلقائي دائم
        function startAdsSlider() {
            const slider = document.getElementById('adsSlider');
            const slidesCount = document.querySelectorAll('.ad-slide').length;
            let currentIndex = 0;
            
            setInterval(() => {
                currentIndex = (currentIndex + 1) % slidesCount;
                slider.style.transform = `translateX(${currentIndex * 100}%)`;
            }, 4000); // تتغير الصورة كل 4 ثوانٍ
        }

        // دالة التحكم التلقائي الكامل بالعروض اليومية
        function handleDailyOffers() {
            const offerSection = document.getElementById('dailyOfferSection');
            const cardContainer = document.getElementById('offerCardContainer');
            const countdownEl = document.getElementById('offerCountdown');
            
            if (productsData.length === 0) return;

            // دورة الـ 5 أيام بالملي ثانية
            const cycleMs = 5 * 24 * 60 * 60 * 1000; 
            // مدة العرض 3 أيام بالملي ثانية
            const offerDurationMs = 3 * 24 * 60 * 60 * 1000; 

            // استخدام الوقت الحالي لحساب أي منتج يجب عرضه وبشكل ثابت وموحد لكل المستخدمين
            const now = new Date().getTime();
            const currentProductIndex = Math.floor(now / cycleMs) % productsData.length;
            const currentProduct = productsData[currentProductIndex];

            // بداية وقت الدورة الحالية
            const cycleStart = Math.floor(now / cycleMs) * cycleMs;
            // نهاية وقت العرض (بعد 3 أيام من البداية)
            const offerEnd = cycleStart + offerDurationMs;

            // إذا كان الوقت الحالي يقع ضمن الـ 3 أيام الأولى، نقوم بإظهار العرض
            if (now < offerEnd) {
                offerSection.style.display = 'block';
                
                const discountedPrice = (currentProduct.price * 0.9).toFixed(3);
                const name = currentLang === 'ar' ? currentProduct.nameAr : currentProduct.nameEn;
                const btnText = currentLang === 'ar' ? 'إضافة للعرض' : 'Add to Offer';
                const currency = currentLang === 'ar' ? 'الف سوداني' : 'sudan';

                cardContainer.innerHTML = `
                    <div class="product-card offer-card-layout" style="border:none; box-shadow:none; background:transparent;">
                        <span class="badge-discount">-10%</span>
                        <img src="${currentProduct.img}" class="offer-image-box" alt="${name}">
                        <div class="offer-details-box">
                            <div class="product-title" style="text-align:initial; white-space:normal;">${name}</div>
                            <div class="product-price" style="text-align:initial; margin-bottom:5px;">
                                <span>${discountedPrice} ${currency}</span>
                                <span class="old-price-strike">${currentProduct.price}</span>
                            </div>
                            <button class="add-to-cart" onclick="addToCart(${currentProduct.id}, ${discountedPrice})">
                                <i class="fa-solid fa-cart-plus"></i> ${btnText}
                            </button>
                        </div>
                    </div>
                `;

                // تحديث العداد التنازلي التلقائي كل ثانية
                if (window.offerInterval) clearInterval(window.offerInterval);
                
                window.offerInterval = setInterval(() => {
                    const currentNow = new Date().getTime();
                    const distance = offerEnd - currentNow;

                    if (distance < 0) {
                        clearInterval(window.offerInterval);
                        offerSection.style.display = 'none';
                    } else {
                        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                        countdownEl.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
                    }
                }, 1000);

            } else {
                // إذا انقضت الـ 3 أيام وبقينا في فترة الـ يومين المتبقين من الـ 5 أيام، يتم إخفاء القسم
                offerSection.style.display = 'none';
            }
        }

        window.onload = () => {

            renderProducts();
            startAdsSlider();
            handleDailyOffers();

        };

    </script>
</body>
</html>
